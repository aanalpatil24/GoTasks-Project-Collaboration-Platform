upstream backend_server {
    # Targets the internal Docker Compose DNS name for the Django container
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;
    
    # Increases upload limit to 50MB to accommodate avatar and document uploads
    client_max_body_size 50M;

    # Frontend: Routes all standard client traffic to the Vite/React server
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # REST API: Routes versioned endpoint requests to the Django DRF backend
    location /api/ {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Panel: Bypasses the React router to serve the native Django admin interface
    location /admin/ {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSockets: Upgrades persistent connections for Django Channels real-time sync
    location /ws/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        
        # Extends timeout limits to prevent Nginx from severing idle WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Assets: Serves collected Django CSS/JS directly from disk for high performance
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Media Uploads: Serves user-uploaded content (e.g., project avatars) directly from disk
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
}